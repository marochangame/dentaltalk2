<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>デンタルトーク</title>
<style>
  :root{--main:#0f8fa8;--main2:#0f6f82;--bg:#f7fbfc;--text:#14212b;--danger:#d94848;--line:#dbe8ec;--muted:#6e858d;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;margin:0;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",Meiryo,sans-serif;background:var(--bg);color:var(--text);}
  body{height:100dvh;}
  .app{height:100dvh;display:flex;flex-direction:column;padding:calc(10px + env(safe-area-inset-top)) 10px calc(8px + env(safe-area-inset-bottom));gap:8px;}
  .top{flex:0 0 52%;min-height:330px;display:flex;flex-direction:column;gap:6px;}
  .title{display:flex;align-items:center;gap:10px;min-height:56px;}
  .brand-mark{width:54px;height:54px;flex:0 0 auto;}
  .brand-text{display:flex;flex-direction:column;gap:1px;min-width:0;}
  .brand-name{font-size:27px;line-height:1.05;margin:0;color:var(--main2);font-weight:950;letter-spacing:.03em;}
  .sub{font-size:12px;color:var(--muted);font-weight:800;line-height:1.2;}
  .screen{flex:1;background:#fff;border:2px solid #d9eef3;border-radius:18px;padding:14px 16px;font-size:31px;line-height:1.22;font-weight:850;word-break:break-word;white-space:pre-wrap;overflow:hidden;display:block;}
  .screen.compact{font-size:27px;line-height:1.16;}
  .screen.tiny{font-size:23px;line-height:1.13;}
  .placeholder{color:#91a3aa;font-weight:650;font-size:26px;}
  .actions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
  button{font-family:inherit;border:1px solid var(--line);border-radius:14px;padding:12px 8px;font-size:18px;font-weight:850;background:#fff;color:var(--text);box-shadow:none;}
  button:active{transform:scale(.985);opacity:.8;}
  .light{color:var(--main2);background:#fff;}
  .danger{color:var(--danger);border:2px solid #efb5b5;background:#fff;}
  .bottom{flex:1;min-height:0;display:flex;flex-direction:column;gap:6px;background:#fff;border:1px solid #e6eef1;border-radius:18px;padding:8px;}
  .tabbar{display:flex;gap:7px;overflow-x:auto;min-height:47px;padding-bottom:2px;scrollbar-width:none;}
  .tabbar::-webkit-scrollbar{display:none;}
  .tab{white-space:nowrap;padding:9px 12px;border-radius:999px;background:#fff;font-size:16px;color:var(--main2);}
  .tab.active{background:var(--main);color:white;border-color:var(--main);}
  .add-tab{margin-left:auto;border-style:dashed;color:var(--main2);min-width:70px;}
  .info{display:flex;align-items:center;justify-content:space-between;gap:8px;min-height:26px;padding:0 3px;}
  .cat-title{font-size:18px;font-weight:900;color:#31515b;}
  .hint{font-size:12px;color:var(--muted);font-weight:700;white-space:nowrap;}
  .grid{flex:1;min-height:0;display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;align-content:start;overflow:hidden;}
  .word{min-height:54px;font-size:18px;line-height:1.25;text-align:center;background:#fff;border:1px solid var(--line);}
  .phrase{grid-column:span 2;text-align:left;min-height:56px;padding-left:14px;padding-right:14px;}
  .fav{border:2px solid #94d6e2;}
  .modal{position:fixed;inset:0;z-index:50;background:rgba(20,33,43,.28);display:none;align-items:flex-end;padding:12px;padding-bottom:calc(12px + env(safe-area-inset-bottom));}
  .modal.show{display:flex;}
  .panel{width:100%;background:#fff;border-radius:18px;padding:14px;box-shadow:0 16px 50px rgba(0,0,0,.18);}
  .panel h2{font-size:19px;margin:0 0 10px;color:#31515b;}
  input,select{width:100%;font-family:inherit;font-size:18px;border:1px solid #cfe0e5;border-radius:12px;padding:12px;background:#fff;margin-bottom:8px;}
  .panel-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px;}
  .primary{background:var(--main);color:#fff;border-color:var(--main);}
  .reset{font-size:14px;color:#59676b;background:#fff;}
  @media (max-height:720px){.brand-mark{width:46px;height:46px}.brand-name{font-size:23px}.sub{font-size:11px}.title{min-height:48px}.top{flex-basis:50%;min-height:300px}.screen{font-size:29px;padding:12px}.screen.compact{font-size:25px}.screen.tiny{font-size:22px}.word{min-height:46px;font-size:16px}.actions button{padding:9px 6px}.tabbar{min-height:40px}.tab{font-size:14px;padding:7px 9px}.info{min-height:22px}.cat-title{font-size:16px}}
  @media (min-width:700px){.app{max-width:760px;margin:0 auto}.screen{font-size:40px}.screen.compact{font-size:34px}.screen.tiny{font-size:29px}.grid{grid-template-columns:repeat(3,minmax(0,1fr))}.phrase{grid-column:span 3}.top{flex-basis:52%}}
</style>
</head>
<body>
<div class="app">
  <section class="top">
    <div class="title">
      <svg class="brand-mark" viewBox="0 0 120 120" role="img" aria-label="デンタルトーク ロゴ">
        <defs><linearGradient id="g" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#0f8fa8"/><stop offset="1" stop-color="#0f6f82"/></linearGradient></defs>
        <path d="M18 27c0-12 10-21 23-21h38c13 0 23 9 23 21v31c0 12-10 21-23 21H51L22 100c-4 3-9-2-7-7l7-17c-3-4-4-9-4-18V27z" fill="url(#g)"/>
        <path d="M46 25c6 0 9 4 14 4s8-4 14-4c10 0 17 8 16 19-1 10-6 18-8 30-2 9-6 17-13 17-7 0-6-12-9-12s-2 12-9 12c-7 0-11-8-13-17-2-12-7-20-8-30-1-11 6-19 16-19z" fill="#fff"/>
        <circle cx="50" cy="50" r="4" fill="#0f6f82"/><circle cx="70" cy="50" r="4" fill="#0f6f82"/>
        <path d="M52 63c4 5 12 5 16 0" fill="none" stroke="#0f6f82" stroke-width="4" stroke-linecap="round"/>
        <circle cx="43" cy="60" r="6" fill="#ffc9bd" opacity=".8"/><circle cx="77" cy="60" r="6" fill="#ffc9bd" opacity=".8"/>
      </svg>
      <div class="brand-text"><div class="brand-name">デンタルトーク</div><div class="sub">歯科用・見せて伝える会話ボード</div></div>
    </div>
    <div id="screen" class="screen"><span class="placeholder">ここに文章ができます</span></div>
    <div class="actions">
      <button class="light" onclick="addSpace()">空白</button>
      <button class="light" onclick="undoText()">一つ戻す</button>
      <button class="danger" onclick="clearText()">全部消す</button>
    </div>
  </section>

  <section class="bottom">
    <div class="tabbar" id="tabs"></div>
    <div class="info"><span class="cat-title" id="categoryTitle"></span><span class="hint">よく使う順・長押しで削除</span></div>
    <div class="grid" id="wordGrid"></div>
  </section>
</div>

<div class="modal" id="addModal" onclick="closeAdd(event)">
  <div class="panel" onclick="event.stopPropagation()">
    <h2>単語・文章を追加</h2>
    <input id="newWord" placeholder="例：少しお口を閉じてください" />
    <select id="newCategory"></select>
    <div class="panel-actions">
      <button class="light" onclick="hideAdd()">閉じる</button>
      <button class="primary" onclick="addWord()">追加</button>
    </div>
    <button class="reset" style="width:100%;margin-top:8px" onclick="resetCounts()">使用回数リセット</button>
  </div>
</div>

<script>
const defaultData = {
  "よく使う": ["痛かったら手を上げてください", "うがいしてください", "口を開けてください", "もう少し開けてください", "大丈夫ですか？", "少し音がします", "水が出ます", "終わりました"],
  "あいさつ": ["こんにちは", "お名前を教えてください", "今日はどうされましたか？", "よろしくお願いします", "お疲れさまでした"],
  "症状": ["痛い", "少し痛い", "しみる", "腫れている", "出血がある", "違和感がある", "いつからですか？"],
  "部位": ["上", "下", "右", "左", "前歯", "奥歯", "ここ", "この歯", "右上", "右下", "左上", "左下"],
  "確認": ["痛いですか？", "しみますか？", "どのくらい痛いですか？", "気分は悪くないですか？", "苦しくないですか？"],
  "指示": ["閉じてください", "楽にしてください", "鼻で呼吸してください", "力を抜いてください", "そのままでお願いします", "少し待ってください"],
  "処置": ["レントゲンを撮ります", "麻酔をします", "少しチクッとします", "削ります", "クリーニングします", "お薬を塗ります", "型取りをします"],
  "終了": ["今日はここまでです", "次回の予約を取ります", "受付でお待ちください", "お大事にしてください"]
};
let data = JSON.parse(localStorage.getItem('dt_words_v2') || 'null') || defaultData;
let counts = JSON.parse(localStorage.getItem('dt_counts_v1') || '{}');
let textParts = [];
let currentCategory = Object.keys(data)[0];
const screen = document.getElementById('screen');
function save(){ localStorage.setItem('dt_words_v2', JSON.stringify(data)); localStorage.setItem('dt_counts_v1', JSON.stringify(counts)); }
function keyFor(cat, word){ return cat + '::' + word; }
function renderTabs(){
  const tabs = document.getElementById('tabs'); tabs.innerHTML='';
  Object.keys(data).forEach(cat=>{ const b=document.createElement('button'); b.className='tab'+(cat===currentCategory?' active':''); b.textContent=cat; b.onclick=()=>{currentCategory=cat; render();}; tabs.appendChild(b); });
  const add=document.createElement('button'); add.className='tab add-tab'; add.textContent='＋追加'; add.onclick=showAdd; tabs.appendChild(add);
  const sel=document.getElementById('newCategory'); sel.innerHTML=''; Object.keys(data).forEach(cat=>{const o=document.createElement('option'); o.value=cat; o.textContent=cat; sel.appendChild(o);}); sel.value=currentCategory;
}
function sortedWords(cat){ return [...data[cat]].sort((a,b)=> (counts[keyFor(cat,b)]||0) - (counts[keyFor(cat,a)]||0)); }
function renderWords(){
  document.getElementById('categoryTitle').textContent = currentCategory;
  const grid=document.getElementById('wordGrid'); grid.innerHTML='';
  sortedWords(currentCategory).forEach(word=>{
    const b=document.createElement('button');
    const c=counts[keyFor(currentCategory,word)]||0;
    b.className='word'+(c>=3?' fav':'')+(word.length>9?' phrase':'');
    b.textContent=word;
    let timer=null;
    let longPressed=false;
    const start=()=>{ longPressed=false; timer=setTimeout(()=>{ longPressed=true; deleteWord(word); },700); };
    const cancel=()=>{ if(timer){ clearTimeout(timer); timer=null; } };
    b.addEventListener('touchstart', start, {passive:true});
    b.addEventListener('touchend', cancel);
    b.addEventListener('touchmove', cancel);
    b.addEventListener('mousedown', start);
    b.addEventListener('mouseup', cancel);
    b.addEventListener('mouseleave', cancel);
    b.onclick=()=>{ if(longPressed){ longPressed=false; return; } appendWord(word); };
    grid.appendChild(b);
  });
}
function deleteWord(word){
  if(!confirm('「'+word+'」を削除しますか？')) return;
  data[currentCategory] = data[currentCategory].filter(w => w !== word);
  delete counts[keyFor(currentCategory,word)];
  save();
  render();
}
function renderScreen(){
  screen.classList.remove('compact','tiny');
  const txt = textParts.length ? textParts.join('') : '';
  screen.textContent = txt;
  if(!textParts.length){ screen.innerHTML = '<span class="placeholder">ここに文章ができます</span>'; return; }
  const lines = txt.split('\n').length;
  if(lines >= 5 || txt.length > 52) screen.classList.add('tiny');
  else if(lines >= 4 || txt.length > 38) screen.classList.add('compact');
}
function render(){ renderTabs(); renderWords(); renderScreen(); }
function currentText(){ return textParts.join(''); }
function isSentence(word){ return word.length >= 7 || /[。？！?!]$/.test(word) || /(ください|お願いします|します|ですか|です|ました|ます)$/.test(word); }
function appendWord(word){
  if(textParts.length && isSentence(word) && !currentText().endsWith('\n')) textParts.push('\n');
  textParts.push(word);
  const k=keyFor(currentCategory,word); counts[k]=(counts[k]||0)+1;
  save(); render();
}
function addSpace(){ textParts.push('　'); renderScreen(); }
function clearText(){ textParts=[]; renderScreen(); }
function undoText(){ textParts.pop(); renderScreen(); }
function showAdd(){ document.getElementById('addModal').classList.add('show'); document.getElementById('newCategory').value=currentCategory; setTimeout(()=>document.getElementById('newWord').focus(),80); }
function hideAdd(){ document.getElementById('addModal').classList.remove('show'); }
function closeAdd(e){ if(e.target.id==='addModal') hideAdd(); }
function addWord(){ const input=document.getElementById('newWord'); const word=input.value.trim(); const cat=document.getElementById('newCategory').value; if(!word) return; if(!data[cat].includes(word)) data[cat].push(word); input.value=''; save(); currentCategory=cat; hideAdd(); render(); }
function resetCounts(){ if(confirm('使用回数をリセットしますか？')){ counts={}; save(); render(); } }
render();
</script>
</body>
</html>
